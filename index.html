<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareRoute — find nearby care</title>
    <style>
        :root {
            --bg: #0f1115;
            --card: #181b22;
            --line: #2a2f3a;
            --ink: #e8eaed;
            --muted: #9aa3b2;
            --accent: #4f9cf9;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
            background: var(--bg);
            color: var(--ink);
            display: flex;
            justify-content: center;
            padding: 32px 16px;
        }

        .wrap {
            width: 100%;
            max-width: 560px;
        }

        h1 {
            font-size: 1.5rem;
            margin: 0 0 4px;
        }

        .sub {
            color: var(--muted);
            margin: 0 0 24px;
            font-size: 0.95rem;
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 20px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--muted);
            margin-bottom: 6px;
        }

        textarea {
            width: 100%;
            min-height: 90px;
            resize: vertical;
            background: #0f1218;
            color: var(--ink);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 12px;
            font: inherit;
        }

        .row {
            display: flex;
            gap: 10px;
            margin-top: 12px;
            align-items: center;
            flex-wrap: wrap;
        }

        button {
            background: var(--accent);
            color: #06122a;
            border: 0;
            border-radius: 8px;
            padding: 11px 18px;
            font-weight: 600;
            cursor: pointer;
            font: inherit;
        }

        button:disabled {
            opacity: 0.6;
            cursor: default;
        }

        .loc {
            font-size: 0.8rem;
            color: var(--muted);
        }

        .answer {
            white-space: pre-wrap;
            line-height: 1.5;
            margin-top: 20px;
            padding: 16px;
            background: #0f1218;
            border: 1px solid var(--line);
            border-radius: 8px;
            height: auto;
            overflow: visible;
        }

        .hint {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 14px;
        }

        .manual {
            margin-top: 10px;
            font-size: 0.8rem;
        }

        .manual input {
            width: 120px;
            background: #0f1218;
            color: var(--ink);
            border: 1px solid var(--line);
            border-radius: 6px;
            padding: 6px;
            font: inherit;
        }
    </style>
</head>

<body>
    <div class="wrap">
        <h1>CareRoute</h1>
        <p class="sub">Describe your symptoms — an AI agent finds the nearest matching providers.</p>

        <div class="card">
            <label for="symptoms">Your symptoms</label>
            <textarea id="symptoms"
                placeholder="e.g. I've had chest tightness and shortness of breath since this morning"></textarea>

            <div class="row">
                <button id="go">Find care</button>
                <span class="loc" id="locStatus">Location: not shared yet</span>
            </div>

            <div class="manual">
                <label style="margin-top:8px">If location is blocked, enter coordinates manually:</label>
                lat <input id="lat" placeholder="12.9352"> lng <input id="lng" placeholder="77.6245">
            </div>

            <div class="answer" id="answer"></div>
            <p class="hint">Synthetic patient (you), real location, real providers from OpenStreetMap.
                This is a demo of the agentic pattern, not a medical service.</p>
        </div>
    </div>

    <script>
        const $ = id => document.getElementById(id);

        // Try to grab the browser's real location up front (one permission click).
        function tryGeolocate() {
            if (!navigator.geolocation) { $("locStatus").textContent = "Location: not supported"; return; }
            navigator.geolocation.getCurrentPosition(
                pos => {
                    $("lat").value = pos.coords.latitude.toFixed(5);
                    $("lng").value = pos.coords.longitude.toFixed(5);
                    $("locStatus").textContent = "Location: shared \u2713";
                },
                () => { $("locStatus").textContent = "Location: blocked — enter manually below"; }
            );
        }
        tryGeolocate();

        $("go").addEventListener("click", async () => {
            const symptoms = $("symptoms").value.trim();
            const lat = parseFloat($("lat").value);
            const lng = parseFloat($("lng").value);

            if (!symptoms) { $("answer").textContent = "Please describe your symptoms first."; return; }
            if (isNaN(lat) || isNaN(lng)) { $("answer").textContent = "Need a location — allow it above, or type lat/lng."; return; }

            $("go").disabled = true;
            $("answer").textContent = "Thinking through your symptoms and searching nearby providers\u2026";

            try {
                const res = await fetch("/care", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ symptoms, lat, lng })
                });
                const data = await res.json();
                $("answer").textContent = data.answer || "No answer returned.";
            } catch (e) {
                $("answer").textContent = "Something went wrong calling the server. Is it running?";
            } finally {
                $("go").disabled = false;
            }
        });
    </script>
</body>

</html>
